<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#317EFB"/>
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/web-app-manifest-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/web-app-manifest-512x512.png">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="login-tab">Вход</button>
            <button class="tab-btn" id="register-tab">Регистрация</button>
        </div>

        <form id="login-form" class="form active">
            <h2>Вход</h2>
            <div class="form-group">
                <label for="login-username">Логин</label>
                <input type="text" id="login-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Пароль</label>
                <input type="password" id="login-password" name="password" required>
            </div>
            <button type="submit">Войти</button>
            <div class="message" id="login-message"></div>
        </form>

        <form id="register-form" class="form">
            <h2>Регистрация</h2>
            <div class="form-group">
                <label for="reg-username">Логин</label>
                <input type="text" id="reg-username" name="username" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" name="email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Пароль</label>
                <input type="password" id="reg-password" name="password" required>
            </div>
            <div class="form-group">
                <label for="reg-confirm">Повторите пароль</label>
                <input type="password" id="reg-confirm" name="confirm" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
            <div class="message" id="register-message"></div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
